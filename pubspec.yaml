name: sadat_delivery_merged
description: "Sadat Delivery - Unified app for Captain, Vendor, and User"
publish_to: "none"
version: 1.0.3+5

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  photo_view: ^0.15.0
  fl_chart: ^0.66.2
  loading_animation_widget: ^1.2.1

  # State management - both Riverpod (captain) and Provider (vendor/user)
  flutter_riverpod: ^2.6.1
  provider: ^6.1.1

  # HTTP and API
  http: ^1.1.2
  dio: ^5.4.3+1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Location and permissions
  geolocator: ^13.0.1
  location: ^6.0.2
  permission_handler: ^12.0.1

  # Image and media
  image_picker: ^1.0.7
  image: ^4.1.7

  # Audio
  audioplayers: ^6.1.0
  record: ^6.0.0

  # File handling
  path_provider: ^2.1.2
  path: ^1.8.3

  # AWS S3 / Wasabi
  minio: ^3.5.8

  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  cloud_firestore: ^4.17.5
  flutter_local_notifications: ^19.4.1

  # Navigation
  go_router: ^15.1.2

  # Maps
  google_maps_flutter: ^2.6.1
  url_launcher: ^6.3.0

  # JWT and auth
  jwt_decode: ^0.3.1

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # JSON serialization
  json_annotation: ^4.8.1

  # Timezone
  timezone: ^0.10.1

  # Form validation
  form_field_validator: ^1.1.0

  # Package info
  package_info_plus: ^8.1.2

  # Launcher icons
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.7.1

# dependency_overrides removed - record v6.x resolves platform packages properly

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/shared/logo.jpeg"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/shared/
    - assets/captain/
    - assets/vendor/images/
    - assets/user/images/
    - assets/user/
